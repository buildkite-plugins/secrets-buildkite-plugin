---
name: Secrets
description: "A Buildkite plugin to fetch secrets from multiple providers"
author: "@buildkite-plugins"
requirements:
  - bash
  - buildkite-agent
configuration:
  properties:
    provider:
      type: string
      enum: ["buildkite", "gcp", "azure", "aws", "op"]
      default: "buildkite"
      description: "The secrets provider to use."
    azure-vault-name:
      type: string
      description: "The Azure Key Vault name (required when provider is azure)."
    azure-secret-version:
      type: string
      description: "The Azure Key Vault secret version (optional, defaults to latest)."
    env:
      type: string
      description: "Secret key name for batch secrets (base64-encoded KEY=value format)"
    variables:
      type: object
      description: "Map of ENV_VAR_NAME: secret-path for individual secrets"
    json-variables:
      type: array
      description: "List of { secret-id, json-key } objects (AWS) whose JSON content at json-key (a jq path, default '.') is expanded into one environment variable per key"
      items:
        type: object
        properties:
          secret-id:
            type: string
            description: "The AWS secret name or ARN to fetch"
          json-key:
            type: string
            default: "."
            description: "jq path into the secret's JSON content to expand (default '.', the whole object)"
        required:
          - secret-id
        additionalProperties: false
    mute-log:
      type: boolean
      default: true
      description: "If true (default), the 'Fetching secrets' log header uses '~~~' (de-emphasized). Set to false to use '---' (bold)."
    skip-redaction:
      type: boolean
      default: false
      description: "If true, secrets will not be redacted in Buildkite logs."
    retry-max-attempts:
      type: number
      default: 5
      description: "Maximum retry attempts for transient failures"
    retry-base-delay:
      type: number
      default: 2
      description: "Base delay in seconds for exponential backoff"
    # GCP Secret Manager options
    gcp-project:
      type: string
      description: "GCP project ID (optional - falls back to CLOUDSDK_CORE_PROJECT or gcloud config)"
    gcp-secret-version:
      type: string
      default: "latest"
      description: "Secret version to fetch (default: latest)"
    # AWS Secrets Manager options
    aws-region:
      type: string
      description: "AWS region to fetch secrets from (optional - falls back to the AWS CLI's configured region)"
    aws-secret-version-id:
      type: string
      description: "AWS Secrets Manager version ID to fetch (optional, defaults to the AWSCURRENT staged version)"
    aws-secret-version-stage:
      type: string
      description: "AWS Secrets Manager staging label to fetch (optional, defaults to AWSCURRENT)"
  additionalProperties: false
